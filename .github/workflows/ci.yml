name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  javascript:
    name: JavaScript checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AwesomeProject

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: AwesomeProject/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test -- --runInBand

  android:
    name: Android debug build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AwesomeProject

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: AwesomeProject/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew
        working-directory: AwesomeProject/android

      - name: Build Android debug
        run: ./gradlew assembleDebug
        working-directory: AwesomeProject/android
